---
name: ci

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          set -o pipefail
          # Active scripts we ship + execute in user installs: FAIL on any severity.
          shellcheck -x install.sh uninstall.sh bin/build-fragment.sh
          # Active hooks/ + contrib/: only fail on ERRORS. Warnings/info tracked
          # as tech debt in CHANGELOG. archive/ scripts are reference material
          # and may have unpacked-from-history patterns we don't enforce.
          shellcheck -S error hooks/*.sh contrib/one-offs/fix-uat-env/*.sh
          # Archived scripts: not enforced — kept for reference only.
          shellcheck hooks/_archive/learned-mistakes/*.sh || true

  json-validate:
    name: json-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate settings fragment is JSON
        run: python3 -c "import json; json.load(open('settings/hooks.fragment.json'))"

  bash-test:
    name: bash-test
    runs-on: ubuntu-latest
    env:
      # Install AND test must see the same HOME, otherwise install copies to
      # RUNNER_TEMP/home/.claude/hooks but test looks at /home/runner/.claude/hooks.
      HOME: ${{ runner.temp }}/home
    steps:
      - uses: actions/checkout@v4
      - name: Install hooks (no settings merge; fragment is intentionally empty)
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          bash install.sh --no-settings
      - name: Run straight-fix-no-ask test
        run: bash test/straight-fix-no-ask.test.sh
      - name: Run fix-uat-env test (if present)
        run: |
          if [[ -x contrib/one-offs/fix-uat-env/test.sh ]]; then
            bash contrib/one-offs/fix-uat-env/test.sh
          fi
        continue-on-error: true

  install-dryrun:
    name: install dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: bash -n install.sh uninstall.sh bin/build-fragment.sh
      - name: Dry-run install (no settings)
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/home"
          mkdir -p "$HOME"
          bash install.sh --dry-run --no-settings 2>&1 | tee install-dryrun.log
          # Validate the dry run produced the expected log line shape
          grep -q 'dry-run' install-dryrun.log
      - name: Uninstall dry-run
        run: bash uninstall.sh 2>&1 | head -20
